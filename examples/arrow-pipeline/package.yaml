name: example-arrow-pipeline
version: 0.0.0
synopsis: Example showing Arrow composition with tower-hs HTTP services
description: |
  Multi-step API aggregation pipeline using Arrow composition (>>>),
  built-in resilience middleware (&), and ArrowChoice routing (|||).
license: MIT
license-file: LICENSE
category: Example
author: Jarl Andre Hubenthal
maintainer: jarlah@protonmail.com

dependencies:
  - base >= 4.14 && < 5

executables:
  example-arrow-pipeline:
    main: Main.hs
    source-dirs: .
    dependencies:
      - tower-hs
      - http-tower-hs
      - http-client >= 0.7 && < 0.8
      - aeson >= 2.1 && < 2.3
      - bytestring >= 0.11 && < 0.13
      - text >= 2.0 && < 2.2
