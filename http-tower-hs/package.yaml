name: http-tower-hs
version: 0.3.0.1
synopsis: Composable HTTP client middleware for Haskell, built on tower-hs
description: |
  http-tower-hs provides HTTP-specific middleware for composable HTTP clients,
  built on top of tower-hs. Includes logging, header manipulation, redirect
  following, OpenTelemetry tracing, response validation, and more.
license: MIT
license-file: LICENSE
author: Jarl André Hübenthal
maintainer: jarlah@protonmail.com
copyright: 2026 Jarl André Hübenthal
category: Network
github: jarlah/tower-hs
tested-with: GHC == 9.6.6, GHC == 9.8.4, GHC == 9.10.1
extra-doc-files:
  - README.md
  - CHANGELOG.md

dependencies:
  - base >= 4.14 && < 5
  - tower-hs >= 0.3.0.0 && < 0.4

library:
  source-dirs: src
  exposed-modules:
    - Network.HTTP.Tower
    - Network.HTTP.Tower.Client
    - Network.HTTP.Tower.Middleware.Logging
    - Network.HTTP.Tower.Middleware.SetHeader
    - Network.HTTP.Tower.Middleware.RequestId
    - Network.HTTP.Tower.Middleware.FollowRedirect
    - Network.HTTP.Tower.Middleware.Validate
    - Network.HTTP.Tower.Middleware.Tracing
    - Network.HTTP.Tower.Middleware.TestDouble
  dependencies:
    - bytestring >= 0.11 && < 0.13
    - containers >= 0.6 && < 0.8
    - crypton-connection >= 0.4 && < 0.5
    - crypton-x509-store >= 1.6 && < 1.7
    - crypton-x509-system >= 1.6 && < 1.7
    - hs-opentelemetry-api >= 0.3 && < 0.4
    - http-client >= 0.7 && < 0.8
    - http-client-tls >= 0.3 && < 0.4
    - tls >= 2.0 && < 2.2
    - http-types >= 0.12 && < 0.13
    - safe-exceptions >= 0.1 && < 0.2
    - text >= 2.0 && < 2.2
    - time >= 1.11 && < 1.15
    - unordered-containers >= 0.2 && < 0.3
    - uuid >= 1.3 && < 1.4

tests:
  http-tower-hs-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - http-tower-hs
      - tower-hs
      - hspec >= 2.11 && < 2.12
      - hspec-discover >= 2.11 && < 2.12
      - QuickCheck >= 2.14 && < 2.15
      - http-client >= 0.7 && < 0.8
      - http-types >= 0.12 && < 0.13
      - text >= 2.0 && < 2.2
      - time >= 1.11 && < 1.15
      - bytestring >= 0.11 && < 0.13
      - stm >= 2.5 && < 2.6
      - async >= 2.2 && < 2.3
      - uuid >= 1.3 && < 1.4
      - containers >= 0.6 && < 0.8
      - hs-opentelemetry-api >= 0.3 && < 0.4
      - hs-opentelemetry-sdk >= 0.1 && < 0.2
      - hs-opentelemetry-exporter-in-memory >= 0.0.1 && < 0.1
      - unagi-chan >= 0.4 && < 0.5
      - process >= 1.6 && < 1.7
      - http-conduit >= 2.3 && < 2.4
      - aeson >= 2.1 && < 2.3
      - vector >= 0.13 && < 0.14
      - hs-opentelemetry-exporter-otlp >= 0.1 && < 0.2
      - http-client-tls >= 0.3 && < 0.4
      - testcontainers >= 0.5 && < 0.6
      - directory >= 1.3 && < 1.4
    build-tools:
      - hspec-discover
