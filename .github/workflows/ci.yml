name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.8.4'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.stack-root }}
            .stack-work
          key: stack-${{ runner.os }}-${{ hashFiles('stack.yaml', 'package.yaml') }}
          restore-keys: stack-${{ runner.os }}-

      - name: Build
        run: stack build --system-ghc --no-docker

      - name: Test
        run: stack test --system-ghc --no-docker

  hlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run HLint
        uses: haskell-actions/hlint-setup@v2

      - name: HLint src/
        uses: haskell-actions/hlint-run@v2
        with:
          path: src/
          fail-on: warning

      - name: HLint test/
        uses: haskell-actions/hlint-run@v2
        with:
          path: test/
          fail-on: warning
