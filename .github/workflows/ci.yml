name: CI

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.6.6', '9.8.4', '9.10.1']

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: 'latest'
          cabal-update: false

      - name: Generate cabal files
        run: |
          curl -sSL https://github.com/sol/hpack/releases/download/0.38.1/hpack_linux.gz | gunzip > /usr/local/bin/hpack
          chmod +x /usr/local/bin/hpack
          hpack tower-hs/
          hpack http-tower-hs/
          hpack servant-tower-hs/
          hpack examples/http-client/
          hpack examples/servant-client/
          hpack examples/generic-redis/

      - name: Update Hackage index
        run: cabal update

      - name: Configure
        run: cabal configure --enable-tests --project-file=cabal.project

      - name: Cache Cabal dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: cabal-${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('tower-hs/package.yaml', 'http-tower-hs/package.yaml', 'servant-tower-hs/package.yaml', 'cabal.project') }}
          restore-keys: cabal-${{ runner.os }}-${{ matrix.ghc }}-

      - name: Build dependencies
        run: cabal build all --only-dependencies --project-file=cabal.project

      - name: Build
        run: cabal build all --project-file=cabal.project

      - name: Test
        run: cabal test all --project-file=cabal.project --test-show-details=direct

  stack-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.8.4'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.stack-root }}
            .stack-work
            tower-hs/.stack-work
            http-tower-hs/.stack-work
            servant-tower-hs/.stack-work
          key: stack-${{ runner.os }}-${{ hashFiles('stack.yaml', 'tower-hs/package.yaml', 'http-tower-hs/package.yaml', 'servant-tower-hs/package.yaml') }}
          restore-keys: stack-${{ runner.os }}-

      - name: Build
        run: stack build --system-ghc --no-docker

      - name: Test
        run: stack test --system-ghc --no-docker

  hlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run HLint
        uses: haskell-actions/hlint-setup@v2

      - name: HLint tower-hs/src/
        uses: haskell-actions/hlint-run@v2
        with:
          path: tower-hs/src/
          fail-on: warning

      - name: HLint tower-hs/test/
        uses: haskell-actions/hlint-run@v2
        with:
          path: tower-hs/test/
          fail-on: warning

      - name: HLint http-tower-hs/src/
        uses: haskell-actions/hlint-run@v2
        with:
          path: http-tower-hs/src/
          fail-on: warning

      - name: HLint http-tower-hs/test/
        uses: haskell-actions/hlint-run@v2
        with:
          path: http-tower-hs/test/
          fail-on: warning

      - name: HLint servant-tower-hs/src/
        uses: haskell-actions/hlint-run@v2
        with:
          path: servant-tower-hs/src/
          fail-on: warning

      - name: HLint servant-tower-hs/test/
        uses: haskell-actions/hlint-run@v2
        with:
          path: servant-tower-hs/test/
          fail-on: warning
