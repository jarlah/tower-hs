name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.6.6', '9.8.4', '9.10.1']

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: 'latest'
          cabal-update: false

      - name: Generate cabal file
        run: |
          curl -sSL https://github.com/sol/hpack/releases/download/0.38.1/hpack_linux.gz | gunzip > /usr/local/bin/hpack
          chmod +x /usr/local/bin/hpack
          hpack

      - name: Update Hackage index
        run: cabal update

      - name: Configure
        run: cabal configure --enable-tests --project-file=cabal.project

      - name: Cache Cabal dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: cabal-${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('http-tower-hs.cabal', 'cabal.project') }}
          restore-keys: cabal-${{ runner.os }}-${{ matrix.ghc }}-

      - name: Build dependencies
        run: cabal build --only-dependencies --project-file=cabal.project

      - name: Build
        run: cabal build --project-file=cabal.project

      - name: Test
        run: cabal test --project-file=cabal.project --test-show-details=direct

  stack-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.8.4'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.stack-root }}
            .stack-work
          key: stack-${{ runner.os }}-${{ hashFiles('stack.yaml', 'package.yaml') }}
          restore-keys: stack-${{ runner.os }}-

      - name: Build
        run: stack build --system-ghc --no-docker

      - name: Test
        run: stack test --system-ghc --no-docker

  hlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run HLint
        uses: haskell-actions/hlint-setup@v2

      - name: HLint src/
        uses: haskell-actions/hlint-run@v2
        with:
          path: src/
          fail-on: warning

      - name: HLint test/
        uses: haskell-actions/hlint-run@v2
        with:
          path: test/
          fail-on: warning
