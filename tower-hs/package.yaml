name: tower-hs
version: 0.1.0.0
synopsis: Composable service middleware for Haskell, inspired by Rust's Tower
description: |
  tower-hs provides a composable middleware abstraction for any service type.
  Build middleware stacks with retry, timeout, circuit breaker, and more — all with
  pure error handling via Either (no exceptions).
license: MIT
license-file: LICENSE
author: Jarl André Hübenthal
maintainer: jarlah@protonmail.com
copyright: 2026 Jarl André Hübenthal
category: Control
github: jarlah/tower-hs
tested-with: GHC == 9.6.6, GHC == 9.8.4, GHC == 9.10.1
extra-doc-files:
  - README.md
  - CHANGELOG.md

dependencies:
  - base >= 4.14 && < 5

library:
  source-dirs: src
  exposed-modules:
    - Tower
    - Tower.Service
    - Tower.Error
    - Tower.Error.Testing
    - Tower.Middleware.Retry
    - Tower.Middleware.Timeout
    - Tower.Middleware.CircuitBreaker
    - Tower.Middleware.Filter
    - Tower.Middleware.Hedge
    - Tower.Middleware.Logging
    - Tower.Middleware.Transform
    - Tower.Middleware.Tracing
    - Tower.Middleware.Validate
    - Tower.Middleware.TestDouble
  dependencies:
    - async >= 2.2 && < 2.3
    - hs-opentelemetry-api >= 0.3 && < 0.4
    - stm >= 2.5 && < 2.6
    - text >= 2.0 && < 2.2
    - time >= 1.11 && < 1.15

tests:
  tower-hs-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - tower-hs
      - bytestring >= 0.11 && < 0.13
      - hedis >= 0.15 && < 0.16
      - hspec >= 2.11 && < 2.12
      - hspec-discover >= 2.11 && < 2.12
      - hs-opentelemetry-api >= 0.3 && < 0.4
      - QuickCheck >= 2.14 && < 2.15
      - process >= 1.6 && < 1.7
      - testcontainers >= 0.5 && < 0.6
      - text >= 2.0 && < 2.2
      - time >= 1.11 && < 1.15
      - stm >= 2.5 && < 2.6
      - async >= 2.2 && < 2.3
    build-tools:
      - hspec-discover
