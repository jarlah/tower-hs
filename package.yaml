name: http-tower-hs
version: 0.1.0.0
synopsis: Composable HTTP client middleware for Haskell, inspired by Rust's Tower
description: |
  http-tower-hs provides a composable middleware abstraction for HTTP clients.
  Build middleware stacks with retry, timeout, logging, and more — all with
  pure error handling via Either (no exceptions).
license: MIT
license-file: LICENSE
author: Jarl André Hübenthal
maintainer: jarlah@protonmail.com
copyright: 2026 Jarl André Hübenthal
category: Network
github: jarlah/http-tower-hs
extra-source-files:
  - README.md
  - CHANGELOG.md
tested-with: GHC == 9.8.4

dependencies:
  - base >= 4.14 && < 5

library:
  source-dirs: src
  exposed-modules:
    - Network.HTTP.Tower
    - Network.HTTP.Tower.Core
    - Network.HTTP.Tower.Error
    - Network.HTTP.Tower.Client
    - Network.HTTP.Tower.Middleware.Retry
    - Network.HTTP.Tower.Middleware.Timeout
    - Network.HTTP.Tower.Middleware.Logging
    - Network.HTTP.Tower.Middleware.CircuitBreaker
    - Network.HTTP.Tower.Middleware.Tracing
    - Network.HTTP.Tower.Middleware.SetHeader
    - Network.HTTP.Tower.Middleware.RequestId
    - Network.HTTP.Tower.Middleware.FollowRedirect
    - Network.HTTP.Tower.Middleware.Filter
    - Network.HTTP.Tower.Middleware.Hedge
    - Network.HTTP.Tower.Middleware.Validate
    - Network.HTTP.Tower.Middleware.TestDouble
  dependencies:
    - async >= 2.2 && < 2.3
    - bytestring >= 0.11 && < 0.13
    - containers >= 0.6 && < 0.8
    - crypton-connection >= 0.4 && < 0.5
    - crypton-x509-store >= 1.6 && < 1.7
    - crypton-x509-system >= 1.6 && < 1.7
    - data-default-class >= 0.1 && < 0.2
    - hs-opentelemetry-api >= 0.3 && < 0.4
    - http-client >= 0.7 && < 0.8
    - http-client-tls >= 0.3 && < 0.4
    - tls >= 2.0 && < 2.2
    - http-types >= 0.12 && < 0.13
    - safe-exceptions >= 0.1 && < 0.2
    - stm >= 2.5 && < 2.6
    - text >= 2.0 && < 2.2
    - time >= 1.11 && < 1.15
    - unordered-containers >= 0.2 && < 0.3
    - uuid >= 1.3 && < 1.4

tests:
  http-tower-hs-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - http-tower-hs
      - hspec >= 2.11 && < 2.12
      - hspec-discover >= 2.11 && < 2.12
      - QuickCheck >= 2.14 && < 2.15
      - http-client >= 0.7 && < 0.8
      - http-types >= 0.12 && < 0.13
      - text >= 2.0 && < 2.2
      - time >= 1.11 && < 1.15
      - bytestring >= 0.11 && < 0.13
      - stm >= 2.5 && < 2.6
      - async >= 2.2 && < 2.3
      - uuid >= 1.3 && < 1.4
      - containers >= 0.6 && < 0.8
      - hs-opentelemetry-api >= 0.3 && < 0.4
      - hs-opentelemetry-sdk >= 0.1 && < 0.2
      - hs-opentelemetry-exporter-in-memory >= 0.0.1 && < 0.1
      - unagi-chan >= 0.4 && < 0.5
      - process >= 1.6 && < 1.7
      - http-conduit >= 2.3 && < 2.4
      - aeson >= 2.1 && < 2.3
      - vector >= 0.13 && < 0.14
      - hs-opentelemetry-exporter-otlp >= 0.1 && < 0.2
      - http-client-tls >= 0.3 && < 0.4
      - testcontainers >= 0.5 && < 0.6
      - directory >= 1.3 && < 1.4
    build-tools:
      - hspec-discover
